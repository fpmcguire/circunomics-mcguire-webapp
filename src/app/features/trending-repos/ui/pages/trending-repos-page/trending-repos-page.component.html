<div class="repos-page">
  <header class="repos-page__header">
    <h1 class="repos-page__title" id="page-title" data-testid="trending-repos-page-title">
      Trending Repositories
    </h1>
    <p class="repos-page__subtitle">Most starred open-source projects from the last 30 days</p>
    @if (!facade.isLoading() && facade.totalCount() > 0) {
      <p class="repos-page__count" aria-live="polite">
        {{ facade.totalCount().toLocaleString() }} repositories found
      </p>
    }
  </header>

  <app-repo-list
    [repos]="facade.repos()"
    [isLoading]="facade.isLoading()"
    [isLoadingMore]="facade.isLoadingMore()"
    [error]="facade.error()"
    [isEmpty]="facade.isEmpty()"
    [ratings]="facade.ratings()"
    (retryClick)="facade.retry()"
    (nameClick)="onNameClick($event)"
  />

  <!-- Infinite scroll sentinel — invisible, aria-hidden, triggers loadNextPage -->
  @if (facade.hasMore() && !facade.error() && !facade.isLoading()) {
    <div
      class="repos-page__sentinel"
      aria-hidden="true"
      appIntersectionObserver
      (intersected)="onSentinelVisible()"
    ></div>
  }
</div>
